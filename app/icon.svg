<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2f23"/>
      <stop offset="100%" style="stop-color:#20633B"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- PCB traces -->
  <g stroke="#3a8a5c" stroke-width="3" fill="none" opacity="0.4">
    <line x1="60" y1="120" x2="160" y2="120"/>
    <line x1="160" y1="120" x2="160" y2="200"/>
    <line x1="350" y1="80" x2="350" y2="160"/>
    <line x1="350" y1="160" x2="440" y2="160"/>
    <line x1="80" y1="380" x2="140" y2="380"/>
    <line x1="140" y1="380" x2="140" y2="440"/>
    <line x1="370" y1="340" x2="370" y2="420"/>
    <line x1="370" y1="420" x2="450" y2="420"/>
  </g>
  <!-- PCB pads -->
  <g fill="#3a8a5c" opacity="0.5">
    <circle cx="60" cy="120" r="8"/>
    <circle cx="160" cy="200" r="8"/>
    <circle cx="350" cy="80" r="8"/>
    <circle cx="440" cy="160" r="8"/>
    <circle cx="80" cy="380" r="8"/>
    <circle cx="140" cy="440" r="8"/>
    <circle cx="370" cy="340" r="8"/>
    <circle cx="450" cy="420" r="8"/>
  </g>
  <!-- Letter T -->
  <g fill="white">
    <!-- Top bar of T -->
    <rect x="106" y="120" width="300" height="60" rx="4"/>
    <!-- Vertical stem of T -->
    <rect x="216" y="120" width="80" height="280" rx="4"/>
  </g>
  <!-- LED glow dots -->
  <circle cx="130" cy="300" r="14" fill="#4ade80" opacity="0.9"/>
  <circle cx="130" cy="300" r="24" fill="#4ade80" opacity="0.25"/>
  <circle cx="382" cy="300" r="14" fill="#facc15" opacity="0.9"/>
  <circle cx="382" cy="300" r="24" fill="#facc15" opacity="0.25"/>
  <circle cx="256" cy="440" r="12" fill="#60a5fa" opacity="0.9"/>
  <circle cx="256" cy="440" r="20" fill="#60a5fa" opacity="0.25"/>
</svg>
